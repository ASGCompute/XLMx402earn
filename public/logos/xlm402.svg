<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="xlm-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7BD5F5"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#e879a8"/>
    </linearGradient>
    <linearGradient id="xlm-grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#e879a8"/>
    </linearGradient>
  </defs>
  <!-- Stellar-x mark -->
  <circle cx="28" cy="40" r="18" fill="none" stroke="#7BD5F5" stroke-width="1.5" opacity="0.5"/>
  <line x1="10" y1="58" x2="46" y2="22" stroke="#7BD5F5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18" y1="22" x2="38" y2="58" stroke="url(#xlm-grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- xlm text -->
  <text x="54" y="50" font-family="'Outfit', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#xlm-grad1)">xlm</text>
  <!-- 402 text -->
  <text x="130" y="50" font-family="'Outfit', system-ui, sans-serif" font-size="32" font-weight="800" fill="url(#xlm-grad2)">402</text>
  <!-- .com -->
  <text x="198" y="50" font-family="'Outfit', system-ui, sans-serif" font-size="18" font-weight="500" fill="#e879a8">.com</text>
  <!-- Constellation dots -->
  <circle cx="120" cy="20" r="2" fill="#a78bfa" opacity="0.6"/>
  <circle cx="155" cy="15" r="1.5" fill="#e879a8" opacity="0.4"/>
  <line x1="120" y1="20" x2="155" y2="15" stroke="#a78bfa" stroke-width="0.5" opacity="0.3"/>
</svg>
